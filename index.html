<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexVital | Haptic-First Pacing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050a10; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* LOGO BRUTE FORCE FIX */
        /* If your logo has a white background, this code 'multiplies' it 
           into the background, effectively making white disappear. */
        .logo-container {
            background: white; /* We put it on white first */
            mix-blend-mode: lighten; /* Then blend it with the dark nav */
            padding: 5px;
            border-radius: 8px;
            display: inline-block;
        }
        .logo-img {
            max-height: 40px;
            display: block;
            /* If the logo is dark on white, this makes it white on dark */
            filter: invert(1) grayscale(1) brightness(2); 
            mix-blend-mode: screen; 
        }

        /* VIDEO BACKGROUND "GIF" FIX */
        .hero-container {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(5,10,16,0.2), rgba(5,10,16,1));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .glass-nav {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass-nav py-3">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <!-- This container helps hide white backgrounds on logos -->
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="FlexVital" class="logo-img">
            </div>
            <button class="bg-[#2bbbb0] text-black px-6 py-2 rounded-full font-black text-xs uppercase italic">Pre-Order</button>
        </div>
    </nav>

    <header class="hero-container">
        <!-- We add every possible attribute to force the video to play -->
        <video autoplay muted loop playsinline preload="auto" id="bg-video">
            <source src="promo.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        
        <div class="content px-6">
            <h1 class="text-6xl md:text-9xl font-black mb-4 tracking-tighter uppercase italic">
                FEEL THE <span class="text-[#2bbbb0]">RUN</span>
            </h1>
            <p class="text-xl text-gray-400 uppercase tracking-widest mb-10">Haptic Pacing • Motion Monitoring</p>
