        body { background-color: #050a10; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* THE VIDEO CONTAINER */
        .video-background {

        .overlay {

            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-img { max-height: 45px; width: auto; }
        .teal-text { color: #2bbbb0; }
        .teal-bg { background-color: #2bbbb0; }

        /* DEBUGGER BOX - Delete this once video works */
        #video-status {

            background: red; color: white;
            padding: 5px 10px; font-size: 10px; z-index: 999;

    </style>
</head>
