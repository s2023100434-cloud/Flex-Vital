<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

    <!-- This is the most basic way to play a video. If this doesn't show, the file is broken. -->
    <video id="v" autoplay muted loop playsinline style="width:100%; height:100vh; object-fit:cover;">
        <source src="promo.mp4" type="video/mp4">
    </video>

    <div style="position:absolute; top:20px; left:20px; color:white; font-family:sans-serif;">
        <h1 style="margin:0;">FLEXVITAL</h1>
        <p id="msg">Checking video status...</p>
    </div>

    <script>
        const v = document.getElementById('v');
        const m = document.getElementById('msg');
        v.onerror = function() { m.innerHTML = "ERROR: promo.mp4 NOT FOUND or CORRUPT"; };
        v.onplay = function() { m.innerHTML = "SUCCESS: Playing"; };
    </script>
</body>
</html>
