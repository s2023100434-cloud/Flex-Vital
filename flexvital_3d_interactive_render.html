<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexVital - Smart Vibration Pacing Band</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; color: white; font-family: 'Inter', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        @media (min-width: 768px) { #ui-layer { flex-direction: row; } }
        .pointer-events-auto { pointer-events: auto; }
        .text-teal { color: #00e699; }
        .bg-teal { background-color: #00e699; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        #screen-canvas { display: none; }
    </style>
</head>
<body>

    <canvas id="screen-canvas" width="300" height="600"></canvas>
    <div id="canvas-container"></div>

    <div id="ui-layer" class="justify-between p-6">
        
        <div class="pointer-events-auto bg-black/80 backdrop-blur-md border border-gray-800 p-8 rounded-2xl w-full md:w-80 shadow-2xl flex flex-col gap-6 max-h-[95vh] overflow-y-auto mb-4 md:mb-0">
            <div>
                <h1 class="text-3xl font-bold tracking-wider">FLEX<span class="text-teal">VITAL</span></h1>
                <p class="text-xs text-gray-400 mt-1 tracking-widest uppercase font-medium">Smart Vibration Pacing Band</p>
            </div>

            <div class="space-y-2">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest border-b border-gray-800 pb-2 mb-3">Display Modes</h2>
                
                <button onclick="setMode('home')" id="btn-home" class="w-full text-left px-4 py-2.5 rounded-xl bg-teal text-black font-semibold border border-teal transition-all group flex items-center justify-between">
                    <span>Home / Time</span>
                    <span class="w-2 h-2 rounded-full bg-black"></span>
                </button>
                
                <button onclick="setMode('walkPace')" id="btn-walkPace" class="w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm">
                    <span>Walking Pace</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>
                
                <button onclick="setMode('jogPace')" id="btn-jogPace" class="w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm">
                    <span>Jog Pace</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>

                <button onclick="setMode('walkTime')" id="btn-walkTime" class="w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm">
                    <span>Walk Duration</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>

                <button onclick="setMode('jogTime')" id="btn-jogTime" class="w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm">
                    <span>Jog Duration</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>

                <button onclick="setMode('totalTime')" id="btn-totalTime" class="w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm">
                    <span>Total Time</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>
            </div>

            <div class="space-y-3 bg-gray-950/80 p-4 rounded-xl border border-gray-800">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Workout Session</h3>
                <div class="flex gap-2">
                    <button id="timer-toggle-btn" onclick="toggleTimer()" class="flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-xs hover:bg-emerald-400 transition-all">
                        PAUSE
                    </button>
                    <button onclick="resetTimer()" class="flex-1 py-2 rounded-lg bg-gray-800 text-gray-300 font-semibold text-xs hover:bg-gray-700 transition-all">
                        RESET
                    </button>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest border-b border-gray-800 pb-2 mb-3">Vibration Guide</h2>
                <div class="flex bg-gray-900 rounded-xl p-1 border border-gray-700">
                    <button id="vib-on-btn" onclick="setVibration(true)" class="flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-sm transition-colors">ON</button>
                    <button id="vib-off-btn" onclick="setVibration(false)" class="flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white">OFF</button>
                </div>
            </div>
        </div>

        <div class="pointer-events-auto self-end bg-black/60 backdrop-blur border border-gray-800 p-4 rounded-xl text-sm text-gray-300 flex items-center gap-3">
            <svg class="w-5 h-5 text-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            Drag to rotate, scroll to zoom
        </div>
    </div>

    <script>
        // --- UI & State Logic ---
        let currentMode = 'home';
        let vibrationOn = true;
        let isTimerRunning = true;
        let animationTime = 0; 
        let elapsedWalkSeconds = 1530.0;  
        let elapsedJogSeconds = 1935.0;   
        let elapsedTotalSeconds = 3465.0; 
        
        const sCanvas = document.getElementById('screen-canvas');
        const ctx = sCanvas.getContext('2d');
        const TEAL = '#00e699';
        const GREY = '#2a2a2a'; 
        const TEXT_WHITE = '#ffffff';
        let screenTexture;

        function formatStopwatch(totalSec) {
            const total = Math.floor(totalSec);
            const h = Math.floor(total / 3600);
            const m = Math.floor((total % 3600) / 60);
            const s = total % 60;
            return [String(h).padStart(2, '0'), String(m).padStart(2, '0'), String(s).padStart(2, '0')].join(':');
        }

        function drawScreen() {
            ctx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, sCanvas.width, sCanvas.height);

            const cx = sCanvas.width / 2;
            const cy = sCanvas.height / 2;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const iconY = cy - 150;
            const iconColor = vibrationOn ? TEAL : '#444444';

            if (currentMode === 'home') drawFootprints(cx, iconY, iconColor);
            else if (currentMode === 'walkPace' || currentMode === 'walkTime') drawWalkingMan(cx, iconY, iconColor, animationTime);
            else if (currentMode === 'jogPace' || currentMode === 'jogTime') drawRunningMan(cx, iconY, iconColor, animationTime);
            else if (currentMode === 'totalTime') drawStopwatchIcon(cx, iconY, iconColor);

            let mainY = cy - 25;
            
            if (currentMode === 'walkTime' || currentMode === 'jogTime' || currentMode === 'totalTime') {
                let duration = 0;
                let label = '';
                if(currentMode === 'walkTime') { duration = elapsedWalkSeconds; label = 'WALK'; }
                if(currentMode === 'jogTime') { duration = elapsedJogSeconds; label = 'JOG'; }
                if(currentMode === 'totalTime') { duration = elapsedTotalSeconds; label = 'TOTAL'; }

                ctx.fillStyle = TEXT_WHITE;
                ctx.font = '600 48px Inter, sans-serif';
                ctx.fillText(formatStopwatch(duration), cx, mainY);

                ctx.fillStyle = TEAL;
                ctx.font = '500 20px Inter, sans-serif';
                ctx.fillText(label, cx, mainY + 50);
            } else {
                const now = new Date();
                let hours = now.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; 
                const timeStr = `${String(hours).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                ctx.fillStyle = TEXT_WHITE;
                ctx.font = '600 72px Inter, sans-serif';
                ctx.fillText(timeStr, cx, mainY - 10);

                ctx.font = '500 20px Inter, sans-serif';
                ctx.fillText(ampm, cx, mainY + 45);

                ctx.strokeStyle = TEAL;
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(cx - 35, mainY + 80); ctx.lineTo(cx + 35, mainY + 80); ctx.stroke();

                if (currentMode !== 'home') {
                    ctx.fillStyle = TEAL;
                    ctx.font = '500 20px Inter, sans-serif';
                    ctx.fillText(currentMode === 'walkPace' ? 'WALK' : 'JOG', cx, mainY + 115);
                }
            }

            drawVibrationIcon(cx, cy + 180, vibrationOn);
            if (screenTexture) screenTexture.needsUpdate = true;
        }

        function drawLimb(startX, startY, length1, angle1, length2, angle2, isBack = false) {
            ctx.save();
            if (isBack) ctx.globalAlpha = 0.4; 
            ctx.translate(startX, startY); ctx.rotate(angle1);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, length1); ctx.stroke();
            if (length2 > 0) {
                ctx.translate(0, length1); ctx.rotate(angle2);
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, length2); ctx.stroke();
            }
            ctx.restore();
        }

        function drawFootprints(x, y, color) {
            ctx.fillStyle = color;
            ctx.save();
            ctx.translate(x, y);
            const drawFoot = (fx, fy, rot) => {
                ctx.save(); ctx.translate(fx, fy); ctx.rotate(rot);
                ctx.beginPath(); ctx.ellipse(0, 0, 5, 11, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(-3.5, -14, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(1.5, -16, 2.5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(6, -13, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            };
            drawFoot(-9, -2, -0.1); drawFoot(9, -14, 0.1);
            ctx.restore();
        }

        function drawWalkingMan(x, y, color, t) {
            ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.save();
            const time = t * 5; const swing = Math.sin(time); const bob = Math.abs(Math.cos(time)) * 1.5; 
            ctx.translate(x, y - bob);
            drawLimb(0, -6, 9, swing * 0.5, 7, 0.2, true); 
            drawLimb(0, 3, 11, -swing * 0.6, 11, swing < 0 ? Math.abs(swing) * 0.8 : 0, true); 
            ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(0, -8); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, -15, 4.5, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
            drawLimb(0, -6, 9, -swing * 0.5, 7, 0.2, false);
            drawLimb(0, 3, 11, swing * 0.6, 11, swing > 0 ? swing * 0.8 : 0, false); 
            ctx.restore();
        }

        function drawRunningMan(x, y, color, t) {
            ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.save();
            const time = t * 8; const swing = Math.sin(time); const bob = Math.abs(Math.cos(time)) * 3;
            ctx.translate(x + 2, y - bob + 2); 
            const lean = -0.25; 
            drawLimb(0, -6, 8, swing * 0.9 + lean, 8, -1.8, true); 
            drawLimb(0, 4, 10, -swing * 0.9 + lean, 10, swing < 0 ? Math.abs(swing) * 1.8 : 0.3, true); 
            ctx.save(); ctx.rotate(lean);
            ctx.beginPath(); ctx.moveTo(0, 4); ctx.lineTo(0, -6); ctx.stroke();
            ctx.beginPath(); ctx.arc(2, -13, 4.5, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
            ctx.restore();
            drawLimb(0, -6, 8, -swing * 0.9 + lean, 8, -1.8, false);
            drawLimb(0, 4, 10, swing * 0.9 + lean, 10, swing > 0 ? swing * 1.8 : 0.3, false); 
            ctx.restore();
        }

        function drawStopwatchIcon(x, y, color) {
            ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.save(); ctx.translate(x, y);
            ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-4, -20); ctx.lineTo(4, -20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(0, -20); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(11, -11); ctx.lineTo(14, -14); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(6, -8); ctx.stroke();
            ctx.restore();
        }

        function drawVibrationIcon(x, y, isOn) {
            const color = isOn ? TEAL : GREY;
            ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.save(); ctx.translate(x, y);
            ctx.beginPath(); ctx.moveTo(-4, -11); ctx.quadraticCurveTo(-10, -5.5, -4, 0); ctx.quadraticCurveTo(2, 5.5, -4, 11); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(4, -11); ctx.quadraticCurveTo(10, -5.5, 4, 0); ctx.quadraticCurveTo(-2, 5.5, 4, 11); ctx.stroke();
            if (isOn) {
                ctx.beginPath(); ctx.arc(-1, 0, 18, Math.PI * 0.75, Math.PI * 1.25); ctx.stroke();
                ctx.beginPath(); ctx.arc(1, 0, 18, -Math.PI * 0.25, Math.PI * 0.25); ctx.stroke();
            }
            ctx.restore();
        }

        window.setMode = function(mode) {
            currentMode = mode;
            const modes = ['home', 'walkPace', 'jogPace', 'walkTime', 'jogTime', 'totalTime'];
            modes.forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if (m === mode) {
                    btn.className = "w-full text-left px-4 py-2.5 rounded-xl bg-teal text-black font-semibold border border-teal transition-all group flex items-center justify-between";
                    btn.querySelector('span:last-child').className = "w-2 h-2 rounded-full bg-black";
                } else {
                    btn.className = "w-full text-left px-4 py-2.5 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between text-sm";
                    btn.querySelector('span:last-child').className = "w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity";
                }
            });
            drawScreen();
        };

        window.toggleTimer = function() {
            isTimerRunning = !isTimerRunning;
            const toggleBtn = document.getElementById('timer-toggle-btn');
            if (isTimerRunning) {
                toggleBtn.innerText = "PAUSE";
                toggleBtn.className = "flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-xs hover:bg-emerald-400 transition-all";
            } else {
                toggleBtn.innerText = "RESUME";
                toggleBtn.className = "flex-1 py-2 rounded-lg bg-emerald-700 text-white font-semibold text-xs hover:bg-emerald-600 transition-all";
            }
        };

        window.resetTimer = function() { elapsedTotalSeconds = 0; elapsedWalkSeconds = 0; elapsedJogSeconds = 0; animationTime = 0; drawScreen(); };

        window.setVibration = function(isOn) {
            vibrationOn = isOn;
            const onBtn = document.getElementById('vib-on-btn'); const offBtn = document.getElementById('vib-off-btn');
            if (isOn) {
                onBtn.className = "flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-sm transition-colors";
                offBtn.className = "flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white";
                // Optional: Attempt browser haptic feedback if supported and not in a restricted iframe
                if(navigator.vibrate) navigator.vibrate(200);
            } else {
                offBtn.className = "flex-1 py-2 rounded-lg bg-gray-600 text-white font-semibold text-sm transition-colors";
                onBtn.className = "flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white";
            }
            drawScreen();
        };

        document.fonts.ready.then(() => drawScreen());

        // --- Three.js Setup and Animation Loop ---
        // Ensure 3D simulation starts only after DOM content is fully loaded
        window.onload = function () {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#030303');
            scene.fog = new THREE.FogExp2('#030303', 0.03);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(3, 2, 7);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05; controls.autoRotate = true; controls.autoRotateSpeed = 1.0;
            controls.minDistance = 3; controls.maxDistance = 15;
            controls.addEventListener('start', () => { controls.autoRotate = false; });

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 10, 5); dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x00e699, 0.2); 
            fillLight.position.set(-5, 0, -5); scene.add(fillLight);

            const watchGroup = new THREE.Group();
            scene.add(watchGroup);

            // 1. Main Body
            const bodyWidth = 1.6; const bodyLength = 3.4; const bodyDepth = 0.4; const bodyRadius = 0.4;
            const shape = new THREE.Shape();
            shape.moveTo(-bodyWidth/2 + bodyRadius, -bodyLength/2); shape.lineTo(bodyWidth/2 - bodyRadius, -bodyLength/2);
            shape.quadraticCurveTo(bodyWidth/2, -bodyLength/2, bodyWidth/2, -bodyLength/2 + bodyRadius); shape.lineTo(bodyWidth/2, bodyLength/2 - bodyRadius);
            shape.quadraticCurveTo(bodyWidth/2, bodyLength/2, bodyWidth/2 - bodyRadius, bodyLength/2); shape.lineTo(-bodyWidth/2 + bodyRadius, bodyLength/2);
            shape.quadraticCurveTo(-bodyWidth/2, bodyLength/2, -bodyWidth/2, bodyLength/2 - bodyRadius); shape.lineTo(-bodyWidth/2, -bodyLength/2 + bodyRadius);
            shape.quadraticCurveTo(-bodyWidth/2, -bodyLength/2, -bodyWidth/2 + bodyRadius, -bodyLength/2);

            const extrudeSettings = { depth: bodyDepth, bevelEnabled: true, bevelSegments: 4, steps: 2, bevelSize: 0.05, bevelThickness: 0.08 };
            const bodyGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            bodyGeo.computeBoundingBox(); bodyGeo.translate(0, 0, -0.5 * bodyDepth);

            const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.3, clearcoat: 0.2 });
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.castShadow = true; bodyMesh.receiveShadow = true; watchGroup.add(bodyMesh);

            // 2. Screen & Glass
            screenTexture = new THREE.CanvasTexture(sCanvas);
            screenTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            const screenGeo = new THREE.PlaneGeometry(bodyWidth - 0.15, bodyLength - 0.3);
            const screenMesh = new THREE.Mesh(screenGeo, new THREE.MeshBasicMaterial({ map: screenTexture, color: 0xffffff }));
            screenMesh.position.set(0, 0, bodyDepth/2 + 0.081); watchGroup.add(screenMesh);

            const glassGeo = new THREE.PlaneGeometry(bodyWidth - 0.15, bodyLength - 0.3);
            const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.05, transmission: 1.0, thickness: 0.1, transparent: true, opacity: 0.15 });
            const glassMesh = new THREE.Mesh(glassGeo, glassMat);
            glassMesh.position.set(0, 0, bodyDepth/2 + 0.085); watchGroup.add(glassMesh);

            // 3. Side Button
            const btnGeo = new THREE.BoxGeometry(0.1, 0.7, 0.1);
            const btnMesh = new THREE.Mesh(btnGeo, new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 }));
            btnMesh.position.set(-bodyWidth/2 - 0.05, 0, 0); watchGroup.add(btnMesh);

            // 4. Detailed Straps
            const strapMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9, metalness: 0.1, bumpScale: 0.02 });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.9, roughness: 0.2 });
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x050505 }); // Fake depth for holes

            function createStrap(isTop) {
                const strapGroup = new THREE.Group();
                const segments = isTop ? 4 : 6; // Bottom strap is longer to overlap
                const segmentLength = 0.8;
                const strapWidth = bodyWidth - 0.2;
                const strapThickness = 0.15;
                
                let currentY = isTop ? bodyLength/2 - 0.1 : -bodyLength/2 + 0.1;
                let currentZ = 0;
                let currentAngle = 0;
                const angleStep = 0.3; 

                for(let i=0; i<segments; i++) {
                    const segGeo = new THREE.BoxGeometry(strapWidth, segmentLength, strapThickness);
                    const segMesh = new THREE.Mesh(segGeo, strapMat);
                    segMesh.castShadow = true; segMesh.receiveShadow = true;

                    // Pivot offset to bend the segments
                    const yOffset = isTop ? segmentLength/2 : -segmentLength/2;
                    segGeo.translate(0, yOffset, 0);
                    
                    segMesh.position.set(0, currentY, currentZ);
                    segMesh.rotation.x = isTop ? -currentAngle : currentAngle;

                    // --- Add Realistic Details ---
                    if (isTop) {
                        // Keeper Loop
                        if (i === 1) {
                            const loopGeo = new THREE.BoxGeometry(strapWidth + 0.08, 0.3, strapThickness + 0.08);
                            const loopMesh = new THREE.Mesh(loopGeo, strapMat);
                            loopMesh.position.set(0, segmentLength/2, 0);
                            segMesh.add(loopMesh);
                        }
                        
                        // Metal Buckle
                        if (i === segments - 1) {
                            const buckleGroup = new THREE.Group();
                            const bGeoSide = new THREE.CylinderGeometry(0.04, 0.04, 0.4);
                            const bGeoTop = new THREE.CylinderGeometry(0.04, 0.04, strapWidth + 0.1);
                            
                            const bLeft = new THREE.Mesh(bGeoSide, metalMat); bLeft.position.set(-strapWidth/2 - 0.05, 0.2, 0);
                            const bRight = new THREE.Mesh(bGeoSide, metalMat); bRight.position.set(strapWidth/2 + 0.05, 0.2, 0);
                            
                            const bTop = new THREE.Mesh(bGeoTop, metalMat);
                            bTop.rotation.z = Math.PI / 2; bTop.position.set(0, 0.4, 0);

                            const bProng = new THREE.Mesh(bGeoSide, metalMat);
                            bProng.position.set(0, 0.2, 0); bProng.rotation.x = 0.15; 

                            buckleGroup.add(bLeft, bRight, bTop, bProng);
                            buckleGroup.position.set(0, segmentLength, 0);
                            segMesh.add(buckleGroup);
                        }
                    } else {
                        // Adjustment Holes
                        if (i >= 1 && i <= segments - 2) {
                            const holeGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 16);
                            
                            const hole1 = new THREE.Mesh(holeGeo, holeMat);
                            hole1.rotation.x = Math.PI / 2; 
                            hole1.position.set(0, -segmentLength/2 + 0.2, strapThickness/2 + 0.005);
                            segMesh.add(hole1);

                            const hole2 = new THREE.Mesh(holeGeo, holeMat);
                            hole2.rotation.x = Math.PI / 2; 
                            hole2.position.set(0, -segmentLength/2 - 0.2, strapThickness/2 + 0.005);
                            segMesh.add(hole2);
                        }

                        // Rounded Tip for the bottom strap
                        if (i === segments - 1) {
                            const tipGeo = new THREE.CylinderGeometry(strapWidth/2, strapWidth/2, strapThickness, 16);
                            const tipMesh = new THREE.Mesh(tipGeo, strapMat);
                            tipMesh.rotation.x = Math.PI / 2; 
                            tipMesh.position.set(0, -segmentLength, 0);
                            segMesh.add(tipMesh);
                        }
                    }

                    strapGroup.add(segMesh);

                    currentY += Math.cos(currentAngle) * segmentLength * (isTop ? 1 : -1);
                    currentZ += Math.sin(currentAngle) * segmentLength * (isTop ? -1 : -1);
                    currentAngle += angleStep;
                }
                return strapGroup;
            }

            watchGroup.add(createStrap(true));  // Top (Buckle)
            watchGroup.add(createStrap(false)); // Bottom (Holes)
            watchGroup.position.y = 0.5;

            // Window Resize handling
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            // Core Render Loop
            let lastTime = performance.now();
            function animate() {
                requestAnimationFrame(animate);
                const now = performance.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                if (isTimerRunning) {
                    elapsedTotalSeconds += dt; elapsedWalkSeconds += dt; elapsedJogSeconds += dt; animationTime += dt;
                }

                drawScreen();
                controls.update(); 
                renderer.render(scene, camera);
            }
            // Start the animation loop
            animate();
        };
    </script>
</body>
