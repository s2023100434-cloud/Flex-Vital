<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexVital - Smart Vibration Pacing Band</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; md:flex-row; }
        .pointer-events-auto { pointer-events: auto; }
        .text-teal { color: #00e699; }
        .bg-teal { background-color: #00e699; }
        
        /* Custom Scrollbar for sidebar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Hidden canvas for screen texture */
        #screen-canvas { display: none; }
    </style>
</head>
<body>

    <!-- Hidden Canvas used for Three.js Texture -->
    <canvas id="screen-canvas" width="300" height="600"></canvas>

    <!-- 3D Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col md:flex-row justify-between p-6">
        
        <!-- Left Panel: Branding & Controls -->
        <div class="pointer-events-auto bg-black/80 backdrop-blur-md border border-gray-800 p-8 rounded-2xl w-full md:w-80 shadow-2xl flex flex-col gap-6 max-h-[90vh] overflow-y-auto mb-4 md:mb-0">
            <div>
                <h1 class="text-3xl font-bold tracking-wider">FLEX<span class="text-teal">VITAL</span></h1>
                <p class="text-xs text-gray-400 mt-1 tracking-widest uppercase">Smart Vibration Pacing Band</p>
            </div>

            <div class="space-y-4">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-widest border-b border-gray-800 pb-2">Display Modes</h2>
                
                <button onclick="setMode('home')" class="w-full text-left px-4 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between">
                    <span>Home / Time</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>
                
                <button onclick="setMode('walkPace')" class="w-full text-left px-4 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between">
                    <span>Walking Pace</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>
                
                <button onclick="setMode('jogPace')" class="w-full text-left px-4 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between">
                    <span>Jog Pace</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>

                <button onclick="setMode('walkTime')" class="w-full text-left px-4 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between">
                    <span>Walk Duration</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>

                <button onclick="setMode('totalTime')" class="w-full text-left px-4 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 border border-gray-700 transition-all group flex items-center justify-between">
                    <span>Total Time</span>
                    <span class="w-2 h-2 rounded-full bg-teal opacity-0 group-hover:opacity-100 transition-opacity"></span>
                </button>
            </div>

            <div class="mt-auto pt-6">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-widest border-b border-gray-800 pb-2 mb-4">Vibration Setting</h2>
                <div class="flex bg-gray-900 rounded-xl p-1 border border-gray-700">
                    <button id="vib-on-btn" onclick="setVibration(true)" class="flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-sm transition-colors">ON</button>
                    <button id="vib-off-btn" onclick="setVibration(false)" class="flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white">OFF</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Instructions -->
        <div class="pointer-events-auto self-end md:self-start bg-black/60 backdrop-blur border border-gray-800 p-4 rounded-xl text-sm text-gray-300 flex items-center gap-3">
            <svg class="w-5 h-5 text-teal" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            Drag to rotate, scroll to zoom
        </div>
    </div>

    <script>
        // --- State Management ---
        let currentMode = 'home';
        let vibrationOn = true;
        
        // --- Canvas Rendering (Smartwatch Screen) ---
        const sCanvas = document.getElementById('screen-canvas');
        const ctx = sCanvas.getContext('2d');
        const TEAL = '#00e699';
        const GREY = '#666666';
        let screenTexture;

        function drawScreen() {
            ctx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            
            // Background
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, sCanvas.width, sCanvas.height);

            const cx = sCanvas.width / 2;
            const cy = sCanvas.height / 2;

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Top Icon Area
            if (currentMode === 'home') {
                drawFootprints(cx, cy - 120, vibrationOn ? TEAL : GREY);
            } else if (currentMode === 'totalTime') {
                drawStopwatch(cx, cy - 120, vibrationOn ? TEAL : GREY);
            } else {
                drawRunningMan(cx, cy - 120, vibrationOn ? TEAL : GREY);
            }

            // Main Text (Time)
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 72px sans-serif';
            
            let mainText = "08:45";
            if (currentMode === 'walkTime') mainText = "00:25:30";
            if (currentMode === 'totalTime') mainText = "00:57:45";
            
            if (mainText.length > 5) {
                ctx.font = 'bold 56px sans-serif'; // smaller for duration
            }
            
            ctx.fillText(mainText, cx, cy - 20);

            // Sub Text
            ctx.font = '24px sans-serif';
            if (currentMode === 'home' || currentMode === 'walkPace' || currentMode === 'jogPace') {
                ctx.fillText("AM", cx, cy + 40);
            }

            // Separator Line
            ctx.strokeStyle = TEAL;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - 60, cy + 80);
            ctx.lineTo(cx + 60, cy + 80);
            ctx.stroke();

            // Mode Label
            if (currentMode !== 'home') {
                ctx.fillStyle = TEAL;
                ctx.font = 'bold 20px sans-serif';
                let modeText = "";
                if (currentMode === 'walkPace' || currentMode === 'walkTime') modeText = "WALK";
                if (currentMode === 'jogPace') modeText = "JOG";
                if (currentMode === 'totalTime') modeText = "TOTAL";
                ctx.fillText(modeText, cx, cy + 110);
            }

            // Vibration Indicator
            const vibY = cy + 180;
            drawVibrationIcon(cx, vibY, vibrationOn);

            // Update 3D texture
            if (screenTexture) screenTexture.needsUpdate = true;
        }

        // Custom Canvas Drawing Functions for Icons
        function drawFootprints(x, y, color) {
            ctx.fillStyle = color;
            ctx.save();
            ctx.translate(x, y);
            
            // Left footprint
            ctx.beginPath();
            ctx.ellipse(-12, 0, 8, 16, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath(); ctx.arc(-18, -22, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-10, -25, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-2, -22, 2.5, 0, Math.PI * 2); ctx.fill();

            // Right footprint (offset)
            ctx.beginPath();
            ctx.ellipse(12, -15, 8, 16, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath(); ctx.arc(6, -37, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(14, -40, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(22, -37, 2.5, 0, Math.PI * 2); ctx.fill();
            
            ctx.restore();
        }

        function drawRunningMan(x, y, color) {
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.save();
            ctx.translate(x, y);
            
            // Head
            ctx.beginPath();
            ctx.arc(4, -20, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Torso
            ctx.beginPath();
            ctx.moveTo(2, -10);
            ctx.lineTo(-4, 10);
            ctx.stroke();

            // Arms
            ctx.beginPath();
            ctx.moveTo(-10, -12); // left arm back
            ctx.lineTo(-2, -5);
            ctx.lineTo(12, -8);  // right arm forward
            ctx.stroke();

            // Legs
            ctx.beginPath();
            ctx.moveTo(-4, 10);
            ctx.lineTo(8, 20); // front leg down
            ctx.lineTo(4, 32); 
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(-4, 10);
            ctx.lineTo(-14, 15); // back leg bent
            ctx.lineTo(-8, 28);
            ctx.stroke();

            ctx.restore();
        }

        function drawStopwatch(x, y, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            
            ctx.save();
            ctx.translate(x, y);
            
            // Body
            ctx.beginPath();
            ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.stroke();

            // Button
            ctx.beginPath();
            ctx.moveTo(-6, -22);
            ctx.lineTo(6, -22);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(0, -22);
            ctx.stroke();

            // Hand
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(8, -8);
            ctx.stroke();

            ctx.restore();
        }

        function drawVibrationIcon(x, y, isOn) {
            const color = isOn ? TEAL : GREY;
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            
            ctx.save();
            ctx.translate(x, y);
            
            // Center squiggle (approximating { } )
            ctx.beginPath();
            ctx.moveTo(-6, -15);
            ctx.bezierCurveTo(0, -10, -10, -5, -2, 0);
            ctx.bezierCurveTo(-10, 5, 0, 10, -6, 15);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(6, -15);
            ctx.bezierCurveTo(0, -10, 10, -5, 2, 0);
            ctx.bezierCurveTo(10, 5, 0, 10, 6, 15);
            ctx.stroke();

            // Outer brackets ( ) if ON
            if (isOn) {
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(-8, 0, 20, Math.PI*0.7, Math.PI*1.3);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(8, 0, 20, -Math.PI*0.3, Math.PI*0.3);
                ctx.stroke();
                
                // Extra outer brackets
                ctx.beginPath();
                ctx.arc(-12, 0, 26, Math.PI*0.75, Math.PI*1.25);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(12, 0, 26, -Math.PI*0.25, Math.PI*0.25);
                ctx.stroke();
            }

            ctx.restore();
        }

        // --- UI Interaction Functions ---
        window.setMode = function(mode) {
            currentMode = mode;
            drawScreen();
        };

        window.setVibration = function(isOn) {
            vibrationOn = isOn;
            const onBtn = document.getElementById('vib-on-btn');
            const offBtn = document.getElementById('vib-off-btn');
            
            if (isOn) {
                onBtn.className = "flex-1 py-2 rounded-lg bg-teal text-black font-semibold text-sm transition-colors";
                offBtn.className = "flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white";
            } else {
                offBtn.className = "flex-1 py-2 rounded-lg bg-gray-600 text-white font-semibold text-sm transition-colors";
                onBtn.className = "flex-1 py-2 rounded-lg text-gray-400 font-semibold text-sm transition-colors hover:text-white";
            }
            drawScreen();
        };

        // Initialize Canvas
        drawScreen();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        
        const scene = new THREE.Scene();
        // Subtle ambient environment setup
        scene.background = new THREE.Color('#0a0a0a');
        scene.fog = new THREE.FogExp2('#0a0a0a', 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3, 2, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        
        // Stop auto-rotate on user interaction
        controls.addEventListener('start', () => { controls.autoRotate = false; });

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x00e699, 0.3); // Subtle teal fill
        fillLight.position.set(-5, 0, -5);
        scene.add(fillLight);

        // --- 3D Model Construction (FlexVital Band) ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // 1. Main Body (Rounded Rectangle)
        const bodyWidth = 1.6;
        const bodyLength = 3.4;
        const bodyDepth = 0.4;
        const bodyRadius = 0.4;

        const shape = new THREE.Shape();
        shape.moveTo(-bodyWidth/2 + bodyRadius, -bodyLength/2);
        shape.lineTo(bodyWidth/2 - bodyRadius, -bodyLength/2);
        shape.quadraticCurveTo(bodyWidth/2, -bodyLength/2, bodyWidth/2, -bodyLength/2 + bodyRadius);
        shape.lineTo(bodyWidth/2, bodyLength/2 - bodyRadius);
        shape.quadraticCurveTo(bodyWidth/2, bodyLength/2, bodyWidth/2 - bodyRadius, bodyLength/2);
        shape.lineTo(-bodyWidth/2 + bodyRadius, bodyLength/2);
        shape.quadraticCurveTo(-bodyWidth/2, bodyLength/2, -bodyWidth/2, bodyLength/2 - bodyRadius);
        shape.lineTo(-bodyWidth/2, -bodyLength/2 + bodyRadius);
        shape.quadraticCurveTo(-bodyWidth/2, -bodyLength/2, -bodyWidth/2 + bodyRadius, -bodyLength/2);

        const extrudeSettings = { 
            depth: bodyDepth, 
            bevelEnabled: true, 
            bevelSegments: 4, 
            steps: 2, 
            bevelSize: 0.05, 
            bevelThickness: 0.08 
        };
        const bodyGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        
        // Center the geometry
        bodyGeo.computeBoundingBox();
        const yOffset = -0.5 * (bodyGeo.boundingBox.max.y - bodyGeo.boundingBox.min.y);
        const zOffset = -0.5 * bodyDepth;
        bodyGeo.translate(0, 0, zOffset);

        const bodyMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x111111, 
            metalness: 0.4, 
            roughness: 0.2,
            clearcoat: 0.3,
            clearcoatRoughness: 0.2
        });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.castShadow = true;
        bodyMesh.receiveShadow = true;
        watchGroup.add(bodyMesh);

        // 2. Screen (Canvas Texture)
        screenTexture = new THREE.CanvasTexture(sCanvas);
        screenTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        
        const screenWidth = bodyWidth - 0.2;
        const screenLength = bodyLength - 0.4;
        const screenGeo = new THREE.PlaneGeometry(screenWidth, screenLength);
        
        // Basic material so screen appears emissive/backlit
        const screenMat = new THREE.MeshBasicMaterial({ 
            map: screenTexture,
            color: 0xffffff
        });
        const screenMesh = new THREE.Mesh(screenGeo, screenMat);
        // Position slightly above the front face of the body
        screenMesh.position.set(0, 0, bodyDepth/2 + 0.081);
        watchGroup.add(screenMesh);

        // Glass overlay for screen
        const glassGeo = new THREE.PlaneGeometry(screenWidth, screenLength);
        const glassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 1.0, // glass-like
            thickness: 0.1,
            transparent: true,
            opacity: 0.2
        });
        const glassMesh = new THREE.Mesh(glassGeo, glassMat);
        glassMesh.position.set(0, 0, bodyDepth/2 + 0.085);
        watchGroup.add(glassMesh);

        // 3. Side Button
        const btnGeo = new THREE.BoxGeometry(0.15, 0.6, 0.15);
        const btnMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.3 });
        const btnMesh = new THREE.Mesh(btnGeo, btnMat);
        btnMesh.position.set(-bodyWidth/2 - 0.05, 0, 0);
        watchGroup.add(btnMesh);

        // 4. Straps (Curved textured bands)
        const strapMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a, 
            roughness: 0.9, 
            metalness: 0.1,
            bumpScale: 0.02
        });

        // We'll create a segmented curve for the strap wrapping around a virtual wrist
        function createStrap(isTop) {
            const strapGroup = new THREE.Group();
            const segments = 6;
            const segmentLength = 0.8;
            const strapWidth = bodyWidth - 0.2;
            const strapThickness = 0.15;
            
            let currentY = isTop ? bodyLength/2 - 0.1 : -bodyLength/2 + 0.1;
            let currentZ = 0;
            let currentAngle = 0;
            const angleStep = 0.3; // Curvature

            for(let i=0; i<segments; i++) {
                const segGeo = new THREE.BoxGeometry(strapWidth, segmentLength, strapThickness);
                const segMesh = new THREE.Mesh(segGeo, strapMat);
                segMesh.castShadow = true;
                segMesh.receiveShadow = true;

                // Pivot offset
                segGeo.translate(0, isTop ? segmentLength/2 : -segmentLength/2, 0);

                segMesh.position.set(0, currentY, currentZ);
                segMesh.rotation.x = isTop ? -currentAngle : currentAngle;
                
                strapGroup.add(segMesh);

                // Calculate next position based on angle
                const dy = Math.cos(currentAngle) * segmentLength * (isTop ? 1 : -1);
                const dz = Math.sin(currentAngle) * segmentLength * (isTop ? -1 : -1);
                
                currentY += dy;
                currentZ += dz;
                currentAngle += angleStep;
            }
            return strapGroup;
        }

        watchGroup.add(createStrap(true));  // Top strap
        watchGroup.add(createStrap(false)); // Bottom strap

        // Center entire watch group slightly higher
        watchGroup.position.y = 0.5;

        // --- Window Resize Handling ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required if controls.enableDamping or controls.autoRotate are set
            renderer.render(scene, camera);
        }

        // Start animation after a slight delay to ensure fonts render on canvas
        setTimeout(animate, 100);

    </script>
</body>
</html>
